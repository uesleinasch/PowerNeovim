# =====================================================================
# Kitty configuration
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# Reload after editing: ctrl+shift+f5  (or kill+restart kitty)
# =====================================================================

# ---------- Fonte ----------
font_family       Fira Code
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         12.0
disable_ligatures never
modify_font cell_height 110%

# ---------- Janela ----------
window_padding_width   8
hide_window_decorations yes
confirm_os_window_close 0

# Janela: minimizar / maximizar / fullscreen sem barra de título
map alt+enter         toggle_maximized
map f11               toggle_fullscreen
map ctrl+shift+f11    toggle_fullscreen
map ctrl+shift+f10    toggle_maximized
map ctrl+shift+m      launch --type=background wmctrl -r :ACTIVE: -b add,hidden
remember_window_size    yes
initial_window_width    1280
initial_window_height   800

# ---------- Cursor ----------
cursor_shape           beam
cursor_blink_interval  0.5
cursor_stop_blinking_after 5.0

# ---------- Scrollback ----------
scrollback_lines 20000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ---------- URLs ----------
url_color #61afef
url_style curly
detect_urls yes

# ---------- Performance ----------
repaint_delay   8
input_delay     2
sync_to_monitor yes

# ---------- Bell ----------
enable_audio_bell no
visual_bell_duration 0.05

# ---------- Clipboard ----------
copy_on_select clipboard
strip_trailing_spaces smart

# =====================================================================
# Tabs
# =====================================================================
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# Atalhos extras de aba
map ctrl+t          new_tab
map ctrl+w          close_tab
map ctrl+1          goto_tab 1
map ctrl+2          goto_tab 2
map ctrl+3          goto_tab 3
map ctrl+4          goto_tab 4
map ctrl+5          goto_tab 5
map ctrl+6          goto_tab 6
map ctrl+7          goto_tab 7
map ctrl+8          goto_tab 8
map ctrl+9          goto_tab 9
map ctrl+shift+r    set_tab_title

# =====================================================================
# Layouts (splits dentro da aba)
# =====================================================================
enabled_layouts splits,stack,tall

# Splits
map f5 launch --location=hsplit --cwd=current
map f6 launch --location=vsplit --cwd=current
map f7 layout_action rotate

# Mover entre janelas (splits)
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Redimensionar janelas
map ctrl+alt+h resize_window narrower
map ctrl+alt+l resize_window wider
map ctrl+alt+k resize_window taller
map ctrl+alt+j resize_window shorter

# =====================================================================
# Tema (Catppuccin Mocha — escuro, agradável com AstroNvim)
# Para trocar: comente o bloco e descomente o desejado
# =====================================================================
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

cursor                  #f5e0dc
cursor_text_color       #1e1e2e

url_color               #f5e0dc

# Tabs
active_tab_background   #cba6f7
active_tab_foreground   #11111b
inactive_tab_background #181825
inactive_tab_foreground #cdd6f4
tab_bar_background      #11111b

# Janelas
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

