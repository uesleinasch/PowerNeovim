# yazi — atalhos de teclado (gerenciado pelo PowerNeovim)
# Docs:     https://yazi-rs.github.io/docs/configuration/keymap
# Defaults: https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/keymap-default.toml
#
# Use `prepend_keymap` / `append_keymap` para ADICIONAR atalhos sem descartar os
# defaults do yazi. Exemplo (descomente para usar — abre um shell no diretório atual):
#
# [mgr]
# prepend_keymap = [
#   { on = "!", run = 'shell "$SHELL" --block', desc = "Abrir shell aqui" },
# ]
