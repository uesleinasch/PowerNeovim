# yazi — configuração gerenciada pelo PowerNeovim
# Docs:     https://yazi-rs.github.io/docs/configuration/yazi
# Defaults: https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml
#
# Arquivos de texto/código abrem no $EDITOR (= nvim, definido no ~/.zshrc).
# Mantemos apenas overrides aqui — o que não estiver listado usa o default do yazi.

[mgr]
show_hidden    = false      # alterne arquivos ocultos em runtime com a tecla `.`
sort_by        = "natural"  # ordenação natural (file2 antes de file10)
sort_dir_first = true       # diretórios primeiro
linemode       = "size"     # mostra o tamanho ao lado de cada item

[preview]
max_width  = 1000
max_height = 1000
